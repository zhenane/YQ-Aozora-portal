<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YQ's Aozora Booth</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <div class="site-header">
    <h1>&#127912; YQ's Aozora Booth</h1>
    <button class="reset-btn" id="reset-btn" type="button">Full Reset</button>
  </div>

  <div class="navbar" id="navbar"></div>

  <div class="search-bar">
    <input id="search" type="text" placeholder="&#128269; Search products...">
  </div>

  <div id="products"></div>

  <div class="cart">
    <h2>&#128722; Cart</h2>
    <div id="cart"></div>
    <div class="total">Revenue: $<span id="total">0</span></div>
    <div class="cart-actions">
      <button id="complete-sale-btn" type="button">Complete Sale</button>
      <button id="clear-cart-btn" type="button">Clear Cart</button>
      <button id="export-csv-btn" type="button">Export CSV</button>
    </div>
  </div>
</div>

<script src="products.js"></script>
<script src="app.js"></script>
</body>
</html>
